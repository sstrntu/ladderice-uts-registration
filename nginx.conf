server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location = /index.html {
    add_header Cache-Control          "no-cache";
    add_header X-Frame-Options        "DENY"                                     always;
    add_header X-Content-Type-Options "nosniff"                                  always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin"          always;
    add_header Permissions-Policy     "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src https://script.google.com https://script.googleusercontent.com; frame-ancestors 'none';" always;
  }

  location ~* \.(?:webp|png|jpg|jpeg|gif|svg|ico|ttf|woff|woff2)$ {
    expires 30d;
    add_header Cache-Control          "public, max-age=2592000, immutable";
    add_header X-Content-Type-Options "nosniff" always;
    try_files $uri =404;
  }

  location = /favicon.ico {
    access_log off;
    log_not_found off;
    return 204;
  }

  location / {
    add_header X-Frame-Options        "DENY"                                     always;
    add_header X-Content-Type-Options "nosniff"                                  always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin"          always;
    add_header Permissions-Policy     "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src https://script.google.com https://script.googleusercontent.com; frame-ancestors 'none';" always;
    try_files $uri $uri/ =404;
  }
}
