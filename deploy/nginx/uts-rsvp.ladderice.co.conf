# ── HTTP: serve ACME challenge, redirect everything else to HTTPS ──
server {
    listen 80;
    listen [::]:80;
    server_name uts-rsvp.ladderice.co uts-rsvp-thunder.ladderice.co;

    root /var/www/uts-rsvp.ladderice.co;

    # Certbot uses this path during HTTP validation.
    location ^~ /.well-known/acme-challenge/ {
        allow all;
        default_type "text/plain";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ──
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name uts-rsvp.ladderice.co uts-rsvp-thunder.ladderice.co;

    ssl_certificate     /etc/letsencrypt/live/uts-rsvp.ladderice.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/uts-rsvp.ladderice.co/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root  /var/www/uts-rsvp.ladderice.co;
    index index.html;

    # Do not expose the git checkout or hidden files.
    location ~ /\.(?!well-known) {
        deny all;
    }

    location = /DEPLOY.md  { return 404; }
    location ^~ /deploy/   { return 404; }

    location ~* \.(?:css|js|png|jpg|jpeg|gif|svg|webp|ttf|otf|woff|woff2)$ {
        expires 7d;
        add_header Cache-Control          "public, max-age=604800, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    location = /favicon.ico {
        access_log off;
        log_not_found off;
        return 204;
    }

    location / {
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options           "DENY"                                         always;
        add_header X-Content-Type-Options    "nosniff"                                      always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;
        add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()"     always;
        add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src https://script.google.com https://script.googleusercontent.com; frame-ancestors 'none';" always;
        try_files $uri $uri/ =404;
    }
}
